<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo - StyleViewer.js</title>
    <!-- 添加以下代碼至網頁中 -->
    <link rel="stylesheet" href="../src/StyleViewer.css">
    <script src="../src/StyleViewer.js"></script>
</head>

<body>
    StyleViewer.js
    <script>
        StyleViewer.init(document.body);
        // 初始化

        StyleViewer.getAllStyle(document.body);
        // 取得所有樣式

        StyleViewer.getDefaultStyle(document.body);
        // 取得使用者代理樣式表樣式

        StyleViewer.getStyleByArray(document.body, ["width", "height"]);
        // 取得陣列中的樣式

        StyleViewer.getStyleByString(document.body, ["width height"]);
        // 取得字串中的樣式 ( 以空格分開 )

        StyleViewer.filterByString("div span iframe");
        // 禁止 StyleViewer 對字串中的選擇器作用

        StyleViewer.filterByArray(["div", "span", "iframe"]);
        // 禁止 StyleViewer 對陣列中的選擇器作用

        StyleViewer.toggle();
        // 關閉 / 開啟 StyleViewer
    </script>
</body>

</html>
