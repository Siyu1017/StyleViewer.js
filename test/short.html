<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo - StyleViewer.js</title>
    <link rel="stylesheet" href="./test.css">
    <!-- 添加以下代碼至網頁中 -->
    <link rel="stylesheet" href="../src/StyleViewer.css">
    <script src="../src/StyleViewer.Short.js"></script>
</head>

<body>
    <div class="content">
        <div class="header">StyleViewer.Short.js</div>
        <div class="usage">
            <div class="title">使用方法</div>
            <div class="group">
                <div class="group-title">初始化</div>
                <div class="group-content">
                    <code>SV.i(target);</code>
                </div>
            </div>
            <div class="group">
                <div class="group-title">
                    <span>進入樣式檢視模式</span>
                    <div class="right-button" onclick="SV.enSM()">點擊進入</div>
                </div>
                <div class="group-content">
                    <code>SV.enSM()</code>
                </div>
            </div>
            <div class="group">
                <div class="group-title">
                    <span>離開樣式檢視模式</span>
                    <div class="right-button" onclick="SV.exSM()">點擊離開</div>
                </div>
                <div class="group-content">
                    <code>SV.exSM()</code>
                </div>
            </div>
            <div class="group">
                <div class="group-title">
                    <span>取得所有樣式</span>
                    <div class="right-button" id="gas">點擊取得 <span style="font-family: monospace;">&lt;body&gt;</span>
                        的所有樣式</div>
                </div>
                <div class="group-content">
                    <code>SV.gAS(target)</code>
                    <div class="noselect">所取得的值 :</div>
                    <code id="demo1"><div>無</div></code>
                </div>
            </div>
            <div class="group">
                <div class="group-title">
                    <span>取得陣列中的樣式</span>
                    <div class="right-button" id="gsba">點擊取得 Width 以及 Height</div>
                </div>
                <div class="group-content">
                    <code>SV.gSBA(target, [styles]);</code>
                    <div class="noselect">所取得的值 :</div>
                    <code id="demo2"><div>無</div></code>
                </div>
            </div>
            <div class="group">
                <div class="group-title">
                    <span>取得字串中的樣式 ( 以空格分開 )</span>
                    <div class="right-button" id="gsbs">點擊取得 Width 以及 Height</div>
                </div>
                <div class="group-content">
                    <code>SV.gSBS(target, styles);</code>
                    <div class="noselect">所取得的值 :</div>
                    <code id="demo3"><div>無</div></code>
                </div>
            </div>
        </div>
    </div>

    <script>
        SV.i(document.body);

        document.getElementById("gas").addEventListener("click", function () {
            document.getElementById('demo1').innerHTML = '';
            SV.gAS(document.body).forEach(s => {
                var temp = "";
                s.content.forEach(j => {
                    temp += `<div style='text-indent: 1rem;font-family: monospace;'><span style='text-indent: 1rem;color: #c80000; font-family: monospace;'>${j.name}</span>: ${j.value};</div>` 
                })
                document.getElementById('demo1').innerHTML += `<div class="style-group"><div style="${s.selector == "element.style" ? "color: rgb(137 137 137);": ""}">${s.selector} {</div>${temp}<div>}</div></div>`;
            });
        })

        document.getElementById("gsba").addEventListener("click", function () {
            document.getElementById('demo2').innerHTML = ''
            SV.gSBA(document.body, ['width', 'height']).forEach(s => {
                document.getElementById('demo2').innerHTML += `<div style='font-family: monospace;'><span style='color: #c80000; font-family: monospace;'>${s.name}</span>: ${s.value};</div>`;
            })
        })

        document.getElementById("gsbs").addEventListener("click", function () {
            document.getElementById('demo3').innerHTML = '';
            SV.gSBS(document.body, 'width height').forEach(s => {
                document.getElementById('demo3').innerHTML += `<div style='font-family: monospace;'><span style='color: #c80000; font-family: monospace;'>${s.name}</span>: ${s.value};</div>`;
            })
        })
    </script>
</body>

</html>
